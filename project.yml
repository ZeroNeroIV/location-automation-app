name: LocationAutomation
options:
  bundleIdPrefix: com.locationautomation
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  LocationAutomation:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    settings:
      base:
        INFOPLIST_FILE: ios/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.locationautomation
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: Core
  Core:
    type: library
    platform: iOS
    sources:
      - path: Sources/Core

schemes:
  LocationAutomation:
    build:
      targets:
        LocationAutomation: all
        Core: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
